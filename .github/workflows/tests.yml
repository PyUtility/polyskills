# This workflow installs the package and runs the unittest suite under
# polyskills/tests against a matrix of supported Python versions.
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Unit Tests (unittest)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Package and Test Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
    - name: Run unittest discover
      # ? POLYSKILLS_REMOTE_TOKEN raises the GitHub REST rate-limit
      # ? from ~60 req/hr (anonymous) to ~5000 req/hr for the runner.
      env:
        POLYSKILLS_REMOTE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python -m unittest discover -v -s polyskills/tests -t .
