# This workflow runs static security analysis (bandit) and audits the
# installed dependency tree for known vulnerabilities (pip-audit).
# For more information see:
# https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Security Scan (bandit, pip-audit)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
    - name: Setup Python 3.12
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.12"
    - name: Install Package and Security Tooling
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
        python -m pip install bandit pip-audit
    - name: Static Security Analysis (bandit)
      # ? scan the package source for common security anti-patterns;
      # ? tests are excluded as fixtures (e.g. dummy tokens) trip
      # ? false positives that are not production security concerns
      run: |
        bandit -r polyskills/ -x polyskills/tests
    - name: Dependency Vulnerability Audit (pip-audit)
      # ? fail the build on any known-vulnerable dependency
      run: |
        pip-audit
